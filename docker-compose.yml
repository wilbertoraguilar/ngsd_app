services:
  database:
    image: 'postgres:latest'
    container_name: books_online_db
    ports:
      - 5432:5432
    networks:
      - books-online-network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: books_online_db

  rabbitmq:
    image: 'rabbitmq:management'
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

networks:
  books-online-network:
    driver: bridge
